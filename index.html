<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI助手充值系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260405a" />
  </head>
  <body>
    <div class="shell-pro">
      <header class="shell-pro__header">
        <div class="shell-pro__logo">
          <span class="logo-mark">AI</span>
          <strong data-i18n="brandTitle">AI助手充值系统</strong>
        </div>
        <div class="shell-pro__lang">
          <button class="lang active" type="button" data-lang="zh">简体中文</button>
          <button class="lang" type="button" data-lang="en">English</button>
        </div>
      </header>

      <section class="shell-pro__flow">
        <div class="flow-head">
          <h2 data-i18n="guideTitle">操作指南</h2>
        </div>
        <ol class="flow-list">
          <li class="flow-item">
            <span class="flow-num">1</span>
            <h3 data-i18n="guideStep1Title">卡密查询</h3>
            <p data-i18n="guideStep1Body">请输入您的CDKEY并点击立即验证。</p>
          </li>
          <li class="flow-item">
            <span class="flow-num">2</span>
            <h3 data-i18n="guideStep2Title">确认登录状态</h3>
            <p data-i18n="guideStep2Body">请确认您已在 chatgpt.com 登录账户，然后选择下一步操作。</p>
          </li>
          <li class="flow-item">
            <span class="flow-num">3</span>
            <h3 data-i18n="guideStep3Title">提交充值信息</h3>
            <p data-i18n="guideStep3Body">点击打开AuthSession页面按钮，将页面内的所有内容复制在session_info输入框内，点击开始激活按钮。</p>
          </li>
        </ol>
      </section>

      <section class="shell-pro__form">
        <div class="form-card">
          <label for="cdkey-input" data-i18n="cdkeyLabel">请输入CDKEY</label>
          <input
            id="cdkey-input"
            type="text"
            data-i18n-placeholder="cdkeyPlaceholder"
            placeholder="例如：5S8F-S888G-5G5G-55HH"
            maxlength="30"
            autocomplete="off"
          />
          <div class="button-row">
            <button id="check-button" type="button" data-i18n="checkButton">立即验证</button>
            <button id="activate-button" type="button" data-i18n="activateButton">开始激活</button>
          </div>
        </div>
        <div class="form-card form-card--secondary">
          <label for="session-info" data-i18n="sessionLabel">session_info（JSON）</label>
          <textarea
            id="session-info"
            rows="5"
            data-i18n-placeholder="sessionPlaceholder"
            placeholder='{"account":{"id":"user-xxx","planType":"free"},"accessToken":"ey...","user":{"email":"test@example.com"}}'
          ></textarea>
          <label class="option-check" for="force-recharge">
            <input id="force-recharge" type="checkbox" />
            <span data-i18n="forceRechargeLabel">放弃剩余会员时间，强制充值</span>
          </label>
          <div class="auth-actions">
            <a
              class="action-link"
              href="https://chatgpt.com/"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n="openChatgpt"
              >打开 ChatGPT</a
            >
            <a
              class="action-link"
              href="https://chatgpt.com/api/auth/session"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n="openAuthSession"
              >打开 AuthSession 页面</a
            >
          </div>
        </div>
      </section>

      <section class="shell-pro__status">
        <article id="check-result-card" class="is-hidden">
          <h2 data-i18n="checkResultTitle">查验结果</h2>
          <pre id="check-result">尚未请求</pre>
        </article>
        <article id="activate-result-card" class="is-hidden">
          <h2 data-i18n="activateResultTitle">激活结果</h2>
          <pre id="activate-result">尚未请求</pre>
        </article>
      </section>
    </div>

    <script>
      window.GPT_SHELL_CONFIG = {
        aliasApiBaseUrl: "https://alias-service.ccmyqs.workers.dev/v1/alias"
      };
    </script>
    <script type="module" src="app.js?v=20260405a"></script>
  </body>
</html>
