<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alias CDKEY Admin</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0b1020;
        color: #e6edff;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .panel {
        width: min(760px, 100%);
        background: #111a33;
        border: 1px solid #253463;
        border-radius: 14px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      .hint {
        margin: 0 0 16px;
        color: #9db2f0;
        font-size: 14px;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 600;
      }
      input,
      textarea,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
      }
      input,
      textarea,
      select {
        border: 1px solid #3754a5;
        background: #0e1630;
        color: #fff;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #21d4fd, #2962ff);
      }
      button.secondary {
        background: #1f2f5f;
      }
      .result {
        margin-top: 16px;
        border: 1px solid #30467f;
        background: #0b142b;
        border-radius: 10px;
        padding: 12px;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .error {
        color: #ff8ca8;
      }
      .ok {
        color: #83f5c0;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>二次CDKEY隐藏管理页</h1>
      <p class="hint">隐藏入口：/_hidden/alias-admin。输入管理密码后，同一个原始CDKEY只会对应一个二次CDKEY。</p>

      <label for="password">管理密码</label>
      <input id="password" type="password" placeholder="请输入管理密码" autocomplete="off" />


      <label for="pool">CDKEY Pool</label>
      <select id="pool">
        <option value="A" selected>熊猫池 (4-5-4-4)</option>
        <option value="B">duolg池 (4-4-5-4)</option>
        <option value="C">ferri Pool (4-4-4-5)</option>
      </select>
      <label for="cdkey">原始CDKEY</label>
      <input id="cdkey" type="text" placeholder="请输入套壳网站原CDKEY" autocomplete="off" />

      <div class="row">
        <button id="create-btn" type="button">生成二次CDKEY</button>
        <button id="copy-btn" class="secondary" type="button">复制结果</button>
      </div>

      <label for="lookup-alias">查询：二次CDKEY -> 原CDKEY</label>
      <div class="row">
        <input id="lookup-alias" type="text" placeholder="输入一个二次CDKEY" autocomplete="off" />
        <button id="lookup-btn" type="button">查询对应原CDKEY</button>
      </div>

      <label for="lookup-alias-list">批量反查询：二次CDKEY -> 原CDKEY（每行一个）</label>
      <textarea id="lookup-alias-list" class="lookup-area" placeholder="每行一个二次CDKEY"></textarea>
      <div class="row">
        <button id="lookup-batch-btn" type="button">批量查询对应原CDKEY</button>
        <button id="copy-lookup-batch-btn" class="secondary" type="button">复制批量反查结果</button>
      </div>

      <pre id="result" class="result">等待操作...</pre>
    </main>

    <script>
      const createBtn = document.getElementById("create-btn");
      const copyBtn = document.getElementById("copy-btn");
      const lookupBtn = document.getElementById("lookup-btn");
      const lookupBatchBtn = document.getElementById("lookup-batch-btn");
      const copyLookupBatchBtn = document.getElementById("copy-lookup-batch-btn");
      const passwordInput = document.getElementById("password");
      const cdkeyInput = document.getElementById("cdkey");
      const lookupAliasInput = document.getElementById("lookup-alias");
      const lookupAliasListInput = document.getElementById("lookup-alias-list");
      const poolInput = document.getElementById("pool");
      const resultNode = document.getElementById("result");
      let lastAlias = "";
      let lastLookupBatchText = "";

      function showResult(text, ok) {
        resultNode.textContent = text;
        resultNode.classList.toggle("ok", !!ok);
        resultNode.classList.toggle("error", !ok);
      }

      createBtn.addEventListener("click", async () => {
        const adminPassword = passwordInput.value.trim();
        const cdkey = cdkeyInput.value.trim();

        if (!adminPassword) {
          showResult("请输入管理密码", false);
          return;
        }

        if (!cdkey) {
          showResult("请输入原始CDKEY", false);
          return;
        }

        createBtn.disabled = true;
        lastLookupBatchText = "";
        showResult("生成中...", true);

        try {
          const response = await fetch("/v1/admin/alias/create", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Admin-Password": adminPassword,
            },
            body: JSON.stringify({ cdkey, pool: poolInput.value || "A" }),
          });

          const payload = await response.json();
          if (!response.ok || payload.success !== true) {
            showResult(payload.msg || "生成失败", false);
            return;
          }

          lastAlias = payload.data?.alias_cdkey || "";
          const created = payload.data?.created === true;
          showResult(`Done\nPool: ${payload.data?.pool || poolInput.value || "A"}\nOriginal CDKEY: ${cdkey}\nAlias CDKEY: ${lastAlias}\nStatus: ${created ? "Created" : "Exists"}`, true);
        } catch (error) {
          showResult(error.message || "请求失败", false);
        } finally {
          createBtn.disabled = false;
        }
      });

      lookupBtn.addEventListener("click", async () => {
        const adminPassword = passwordInput.value.trim();
        const aliasCdkey = lookupAliasInput.value.trim();

        if (!adminPassword) {
          showResult("请输入管理密码", false);
          return;
        }

        if (!aliasCdkey) {
          showResult("请输入二次CDKEY", false);
          return;
        }

        lookupBtn.disabled = true;
        lastLookupBatchText = "";
        showResult("查询中...", true);

        try {
          const response = await fetch("/v1/admin/alias/lookup", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Admin-Password": adminPassword,
            },
            body: JSON.stringify({ alias_cdkey: aliasCdkey }),
          });

          const payload = await response.json();
          if (!response.ok || payload.success !== true) {
            showResult(payload.msg || "查询失败", false);
            return;
          }

          const item = payload.data || {};
          showResult(`Lookup ok\nPool: ${item.pool || ""}\nAlias CDKEY: ${item.alias_cdkey || ""}\nOriginal CDKEY: ${item.cdkey || ""}`, true);
        } catch (error) {
          showResult(error.message || "请求失败", false);
        } finally {
          lookupBtn.disabled = false;
        }
      });

      lookupBatchBtn.addEventListener("click", async () => {
        const adminPassword = passwordInput.value.trim();
        const aliasCdkeysText = lookupAliasListInput.value.trim();

        if (!adminPassword) {
          showResult("请输入管理密码", false);
          return;
        }

        if (!aliasCdkeysText) {
          showResult("请输入二次CDKEY列表", false);
          return;
        }

        lookupBatchBtn.disabled = true;
        showResult("批量查询中...", true);

        try {
          const response = await fetch("/v1/admin/alias/lookup-from-list", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Admin-Password": adminPassword,
            },
            body: JSON.stringify({ alias_cdkeys_text: aliasCdkeysText }),
          });

          const payload = await response.json();
          if (!response.ok || payload.success !== true) {
            showResult(payload.msg || "批量查询失败", false);
            return;
          }

          const items = payload.data?.items || [];
          const rows = items.map((item) => {
            const alias = item.alias_cdkey || "";
            const original = item.cdkey || "";
            const pool = item.pool ? ` [${item.pool}]` : "";
            return `${alias} => ${original}${pool} [${item.found ? "Found" : "NotFound"}]`;
          });
          lastLookupBatchText = rows.join("\n");
          showResult(`Lookup batch done\nCount: ${payload.data?.count || items.length}\nFound: ${payload.data?.found_count || 0}\nMissing: ${payload.data?.missing_count || 0}\n\n${lastLookupBatchText}`, true);
        } catch (error) {
          showResult(error.message || "请求失败", false);
        } finally {
          lookupBatchBtn.disabled = false;
        }
      });

      copyBtn.addEventListener("click", async () => {
        if (!lastAlias) {
          showResult("暂无可复制的二次CDKEY", false);
          return;
        }

        try {
          await navigator.clipboard.writeText(lastAlias);
          showResult(`Copied: ${lastAlias}`, true);
        } catch {
          showResult(`Copy failed, copy manually: ${lastAlias}`, false);
        }
      });

      copyLookupBatchBtn.addEventListener("click", async () => {
        if (!lastLookupBatchText) {
          showResult("暂无可复制批量反查结果", false);
          return;
        }

        try {
          await navigator.clipboard.writeText(lastLookupBatchText);
          showResult("已复制批量反查结果", true);
        } catch {
          showResult(`复制失败，请手动复制\n${lastLookupBatchText}`, false);
        }
      });
    </script>
  </body>
</html>
